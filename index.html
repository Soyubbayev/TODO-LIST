<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalStorage-homework-TODO</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<section class="boxes">
  <div class="boxes__box">
    <h1 class="boxes__box--title">Todo App</h1>

    <div class="boxes__box--form">
      <input type="text" id="boxes__box--input" placeholder="Add your new todo">
      <button id="boxes__box--btn">+</button>
    </div>

    <ul id="boxes__box--list"></ul>

    <div class="boxes__box--footer">
      <span id="boxes__box--count">You have 0 pending tasks</span>
      <button id="boxes__box--clear">Clear All</button>
    </div>
  </div>
</section>
  <script src="js/index.js"></script>
</body>
</html>
